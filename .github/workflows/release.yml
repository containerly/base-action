name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  release:
    name: Tag and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          current=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' \
            | sort -V | tail -1)
          current="${current:-v0.0.0}"
          echo "current=${current}" >> "$GITHUB_OUTPUT"

          IFS='.' read -r major minor patch <<< "${current#v}"

          case "${{ inputs.bump }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac

          next="v${major}.${minor}.${patch}"
          echo "next=${next}" >> "$GITHUB_OUTPUT"
          echo "major=v${major}" >> "$GITHUB_OUTPUT"

      - name: Create and push version tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.next }}"
          git push origin "${{ steps.version.outputs.next }}"

      - name: Update floating major tag
        run: |
          major="${{ steps.version.outputs.major }}"
          git tag -f "$major"
          git push origin "refs/tags/${major}" --force

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.next }}" \
            --title "${{ steps.version.outputs.next }}" \
            --generate-notes \
            --latest
