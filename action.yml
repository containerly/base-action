name: 'ShellCheck'
description: 'Run ShellCheck static analysis on shell scripts'
author: 'containerly'

branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  files:
    description: 'Space-separated list of shell script files to check'
    required: true
  severity:
    description: 'Minimum severity to report: error, warning, info, style'
    required: false
    default: 'warning'
  format:
    description: 'Output format: tty, checkstyle, diff, gcc, json, json1, quiet'
    required: false
    default: 'tty'
  shell:
    description: 'Override shell dialect: sh, bash, dash, ksh'
    required: false
    default: ''
  exclude:
    description: 'Comma-separated check codes to exclude (e.g. SC2034,SC2086)'
    required: false
    default: ''
  args:
    description: 'Additional raw arguments appended to the shellcheck command'
    required: false
    default: ''

outputs:
  exit-code:
    description: 'Exit code returned by shellcheck'

runs:
  using: 'docker'
  image: 'Dockerfile'
